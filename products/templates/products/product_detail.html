{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <header>
        <div class="logo"><a href="{% url 'product_list' %}">MyStore</a></div>
        <nav class="nav-links">
            {% if user.is_authenticated %}
            <span>Hello, {{ user.username }}!</span>
            <a href="{% url 'logout' %}">Logout</a>
            <a href="{% url 'view_cart' %}" class="primary-link">View Cart</a>
            {% else %}
            <a href="{% url 'login' %}" class="primary-link">Login</a>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        <div class="product-detail-container">
            <div class="product-detail-image">
                {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
                {% endif %}
            </div>
            <div class="product-detail-info">
                <h2>{{ product.name }}</h2>
                <p class="product-detail-price">₹{{ product.price }}</p>
                <p class="product-detail-description">{{ product.description }}</p>
                <form action="{% url 'add_to_cart' product.pk %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary">Add to Cart</button>
                </form>
                <a href="{% url 'product_list' %}" class="btn btn-secondary" style="margin-top: 1rem;">Back to
                    products</a>
            </div>
        </div>
    </div>
</body>

</html>
